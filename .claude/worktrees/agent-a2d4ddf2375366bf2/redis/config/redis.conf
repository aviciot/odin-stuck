# Odin Redis configuration
# Container: odin-redis

# Persistence — AOF for durability
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec

# Snapshots — RDB every 5 min if 1+ key changed
save 300 1
save 60 100

# Memory
maxmemory 256mb
maxmemory-policy allkeys-lru

# Logging
loglevel notice

# No protected-mode inside Docker network
protected-mode no
